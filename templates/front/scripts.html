<!-- Core Libraries -->
<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Custom JavaScript -->
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

<!-- Notification Handler (Centralized from header.html) -->
<script>
    document.getElementById('markNotificationsRead')?.addEventListener('click', async function (e) {
        e.preventDefault();
        e.stopPropagation();
        try {
            const response = await fetch('/notifications/mark-read', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            });
            if (response.ok) {
                const badge = document.querySelector('#notificationDropdown .badge');
                const itemsToHide = document.querySelectorAll('.general-notification-item');

                if (itemsToHide.length > 0) {
                    itemsToHide.forEach(item => item.remove());
                }

                const menu = document.getElementById('notificationMenu');
                const remainingItems = menu.querySelectorAll('li:not(.dropdown-divider)');

                if (remainingItems.length === 0) {
                    menu.innerHTML = `
                        <li class="empty-notifications">
                            <span class="dropdown-item text-muted text-center py-3">
                                <i class="fa-regular fa-bell-slash me-2"></i>No notifications
                            </span>
                        </li>
                    `;
                    if (badge) badge.remove();
                } else {
                    if (badge && menu.querySelectorAll('li.dropdown-header').length === 0) {
                        badge.remove();
                    }
                }
            }
        } catch (error) {
            console.error('Error marking notifications as read:', error);
        }
    });

    // Centralized Flash Message Handling
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: '{{ "success" if category == "success" else "error" if category in ["error", "danger"] else "info" }}',
                    title: '{{ message }}',
                    showConfirmButton: false,
                    timer: 3000,
                    timerProgressBar: true
                });
            {% endfor %}
        {% endif %}
    {% endwith %}
</script>
