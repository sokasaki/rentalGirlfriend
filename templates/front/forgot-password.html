<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include 'common_head_tags.html' %}

    <title>Forgot Password - RentACompanion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>

<body class="auth-page">

    <!-- Forgot Password Section -->
    <section class="auth-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7">
                    <div class="card border-0 shadow-lg rounded-4 auth-card">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <div class="mb-3">
                                    <i class="fas fa-lock fa-3x text-primary"></i>
                                </div>
                                <h2 class="fw-bold mb-2">Forgot Password?</h2>
                                <p class="text-muted">No worries! Enter your email and we'll send you reset
                                    instructions.</p>
                            </div>

                            <form class="auth-form">
                                <div class="mb-4">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-control form-control-lg"
                                        placeholder="your@email.com" required>
                                </div>

                                <button type="submit" class="btn btn-primary btn-lg w-100 auth-btn mb-3">
                                    <i class="fas fa-paper-plane me-2"></i>Send Reset Link
                                </button>
                            </form>

                            <div class="text-center">
                                <a href="{{ url_for('login') }}" class="text-primary">
                                    <i class="fas fa-arrow-left me-2"></i>Back to Login
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    {% include 'front/scripts.html' %}
</body>

</html>
