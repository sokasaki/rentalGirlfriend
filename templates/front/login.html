<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include 'common_head_tags.html' %}

    <title>Login - RentACompanion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>

<body class="auth-page">
    <!-- Login Section -->
    <section class="auth-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7">
                    <div class="card border-0 shadow-lg rounded-4 auth-card">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <h2 class="fw-bold mb-2 auth-heading">Welcome Back!</h2>
                                <p class="text-muted auth-subtext">Login to your account to continue</p>
                            </div>

                            <form class="auth-form" method="POST" action="{{ url_for('do_customer_login') }}">
                                <div class="mb-3">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" name="email" class="form-control form-control-lg"
                                        id="loginEmail" placeholder="your@email.com" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" name="password" class="form-control form-control-lg"
                                        id="loginPassword" placeholder="Enter your password" required>
                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="rememberMe"
                                            name="rememberMe">
                                        <label class="form-check-label" for="rememberMe">
                                            Remember me
                                        </label>
                                    </div>
                                    <a href="{{ url_for('forgot_password') }}"
                                        class="text-primary text-decoration-none">Forgot
                                        Password?</a>
                                </div>

                                <button type="submit" class="btn btn-primary btn-lg w-100 auth-btn mb-3">
                                    <i class="fas fa-sign-in-alt me-2"></i>Login
                                </button>
                            </form>

                            <div class="text-center my-3">
                                <span class="text-muted">or continue with</span>
                            </div>

                            <div class="d-grid gap-2">
                                <button class="btn btn-outline-secondary rounded-pill">
                                    <i class="fab fa-google me-2"></i>Continue with Google
                                </button>
                                <button class="btn btn-outline-secondary rounded-pill">
                                    <i class="fab fa-facebook me-2"></i>Continue with Facebook
                                </button>
                            </div>

                            <p class="text-center text-muted mt-4 mb-0">
                                Don't have an account? <a href="{{ url_for('register') }}"
                                    class="text-primary fw-bold">Sign Up</a>
                            </p>
                        </div>
                    </div>

                    <!-- Additional Info -->
                    <div class="text-center mt-4">
                        <small class="text-muted">
                            By continuing, you agree to our
                            <a href="#" class="text-primary">Terms of Service</a> and
                            <a href="#" class="text-primary">Privacy Policy</a>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </section>

    {% include 'front/scripts.html' %}
</body>

</html>
