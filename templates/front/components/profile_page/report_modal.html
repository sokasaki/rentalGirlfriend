    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="reportModalLabel">Report Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form action="{{ url_for('submit_report') }}" method="POST">
                    <div class="modal-body p-4">
                        <p class="text-muted small mb-4">Your report is anonymous and helps us keep the community safe.
                            Please select a reason for reporting <strong>{{ companion.display_name }}</strong>.</p>

                        <input type="hidden" name="target_type" value="COMPANION">
                        <input type="hidden" name="target_id" value="{{ companion.user_id }}">

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase">Reason for reporting</label>
                            <select class="form-select border-0 bg-light" name="reason" required>
                                <option value="" selected disabled>Choose a reason...</option>
                                <option value="Inappropriate content or bio">Inappropriate content or bio</option>
                                <option value="Fake profile or misleading information">Fake profile or misleading
                                    information</option>
                                <option value="Harassment or abusive behavior">Harassment or abusive behavior</option>
                                <option value="Solicitation or spam">Solicitation or spam</option>
                                <option value="Safety concerns during a session">Safety concerns during a session
                                </option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="mb-0 pt-2">
                            <label class="form-label small fw-bold text-uppercase">Additional Details (Optional)</label>
                            <textarea class="form-control border-0 bg-light" name="details" rows="3"
                                placeholder="Please provide more context..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer border-0 pt-0 pb-4 px-4">
                        <button type="button" class="btn btn-light rounded-pill px-4"
                            data-bs-toggle="modal">Cancel</button>
                        <button type="submit" class="btn btn-danger rounded-pill px-4">Submit Report</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
