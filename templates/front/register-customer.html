<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include 'common_head_tags.html' %}

    <title>Customer Registration - RentACompanion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>

<body class="auth-page">
    <!-- {% include 'front/header.html' %} -->

    <div class="mesh-gradient" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-color: #f8fafc; background-image: radial-gradient(at 40% 20%, hsla(28,100%,74%,0.15) 0, transparent 50%), radial-gradient(at 80% 0%, hsla(189,100%,56%,0.15) 0, transparent 50%), radial-gradient(at 0% 100%, hsla(242,100%,70%,0.15) 0, transparent 50%), radial-gradient(at 80% 100%, hsla(343,100%,76%,0.15) 0, transparent 50%);"></div>

    <section class="py-5 min-vh-100 d-flex align-items-center">
        <div class="container animate-fade-in-up">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card auth-card border-0 shadow-premium overflow-hidden">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-5">
                                <h2 class="fw-bold mb-2" style="letter-spacing: -1.5px;">Customer Registration</h2>
                                <p class="text-muted">Join our community as a customer</p>
                            </div>

                            <!-- Step Indicator -->
                            <div class="step-indicator px-lg-5">
                                <div class="step active" data-step="1">
                                    <div class="step-number">1</div>
                                    <small class="fw-semibold">Basic Info</small>
                                </div>
                                <div class="step" data-step="2">
                                    <div class="step-number">2</div>
                                    <small class="fw-semibold">Profile</small>
                                </div>
                            </div>

                            <form id="customerRegistrationForm" class="auth-form mt-4" method="POST" action="{{ url_for('do_register_customer') }}" enctype="multipart/form-data" novalidate>
                                <!-- Step 1: Basic Account Info -->
                                <div class="form-step active" data-step="1">
                                    <div class="glass-premium p-4 rounded-4 mb-4">
                                        <h5 class="mb-4 fw-bold"><i class="fas fa-id-card text-primary me-2"></i> Account Details</h5>
                                        
                                        <div class="mb-3">
                                            <label class="form-label">Full Name <span class="text-danger">*</span></label>
                                            <input type="text" name="full_name" class="form-control" placeholder="Enter your full name" required>
                                        </div>

                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Email <span class="text-danger">*</span></label>
                                                <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Phone Number <span class="text-danger">*</span></label>
                                                <input type="tel" name="phone" class="form-control" placeholder="+1 (555) 000-0000" required>
                                            </div>
                                        </div>

                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Password <span class="text-danger">*</span></label>
                                                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
                                                <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
                                            </div>
                                        </div>

                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Date of Birth <span class="text-danger">*</span></label>
                                                <input type="date" name="dob" class="form-control" required>
                                                <small class="text-muted">Must be 18 years or older</small>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Gender <span class="text-danger">*</span></label>
                                                <select name="gender" class="form-select" required>
                                                    <option value="">Select...</option>
                                                    <option value="MALE">Male</option>
                                                    <option value="FEMALE">Female</option>
                                                    <option value="OTHER">Other</option>
                                                    <option value="PREFER_NOT_TO_SAY">Prefer not to say</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="d-flex justify-content-end mt-4">
                                        <button type="button" class="btn btn-primary btn-lg rounded-pill px-5 hover-lift" onclick="nextStep()">
                                            Next Step <i class="fas fa-arrow-right ms-2"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- Step 2: Profile Information -->
                                <div class="form-step" data-step="2">
                                    <div class="glass-premium p-4 rounded-4 mb-4">
                                        <h5 class="mb-4 fw-bold"><i class="fas fa-user-circle text-primary me-2"></i> Profile Info</h5>

                                        <div class="mb-3">
                                            <label class="form-label">Profile Photo (Optional)</label>
                                            <div class="input-group">
                                                <label class="input-group-text bg-white border-end-0" for="profilePhoto"><i class="fas fa-upload text-muted"></i></label>
                                                <input type="file" name="profile_photo" class="form-control border-start-0" id="profilePhoto" accept="image/*">
                                            </div>
                                            <div id="photoPreview" class="mt-3" style="max-width: 150px;"></div>
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label">Location / City <span class="text-danger">*</span></label>
                                            <input type="text" name="location" class="form-control" placeholder="e.g. New York, NY" required>
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label">Short Bio (Optional)</label>
                                            <textarea name="bio" class="form-control" rows="3" maxlength="500" placeholder="Tell us a bit about yourself..."></textarea>
                                            <div class="d-flex justify-content-end">
                                                <small class="text-muted mt-1 char-counter">0 / 500 characters</small>
                                            </div>
                                        </div>

                                        <hr class="my-4 opacity-50">

                                        <div class="mb-3">
                                            <div class="form-check custom-check">
                                                <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                                                <label class="form-check-label" for="agreeTerms">
                                                    I agree to the <a href="#" class="text-primary fw-bold text-decoration-none">Terms & Conditions</a> <span class="text-danger">*</span>
                                                </label>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <div class="form-check custom-check">
                                                <input class="form-check-input" type="checkbox" id="agreeConduct" required>
                                                <label class="form-check-label" for="agreeConduct">
                                                    I agree to the <a href="#" class="text-primary fw-bold text-decoration-none">Code of Conduct</a> <span class="text-danger">*</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="d-flex justify-content-between mt-4">
                                        <button type="button" class="btn btn-link text-muted text-decoration-none fw-bold px-4" onclick="prevStep()">
                                            <i class="fas fa-arrow-left me-2"></i> Back
                                        </button>
                                        <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5 hover-lift">
                                            <i class="fas fa-check-circle me-2"></i> Complete Registration
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        let currentStep = 1;

        function nextStep() {
            if (currentStep < 2) {
                // Validate Step 1 required fields
                const currentStepElement = document.querySelector(`.form-step[data-step="${currentStep}"]`);
                const requiredInputs = currentStepElement.querySelectorAll('input[required], select[required]');
                let isValid = true;
                let firstInvalidField = null;

                requiredInputs.forEach(input => {
                    // Remove previous validation state
                    input.classList.remove('is-invalid', 'is-valid');

                    // Check if field is empty
                    if (!input.value.trim()) {
                        input.classList.add('is-invalid');
                        isValid = false;
                        if (!firstInvalidField) firstInvalidField = input;

                        // Add error message if not exists
                        if (!input.nextElementSibling || !input.nextElementSibling.classList.contains('invalid-feedback')) {
                            const errorDiv = document.createElement('div');
                            errorDiv.className = 'invalid-feedback';
                            errorDiv.textContent = 'This field is required';
                            input.parentNode.appendChild(errorDiv);
                        }
                    } else {
                        input.classList.add('is-valid');
                        // Remove error message if exists
                        if (input.nextElementSibling && input.nextElementSibling.classList.contains('invalid-feedback')) {
                            input.nextElementSibling.remove();
                        }
                    }
                });

                // Check password match
                const password = currentStepElement.querySelector('input[type="password"]');
                const confirmPassword = currentStepElement.querySelectorAll('input[type="password"]')[1];
                if (password && confirmPassword && password.value && confirmPassword.value) {
                    if (password.value !== confirmPassword.value) {
                        confirmPassword.classList.add('is-invalid');
                        confirmPassword.classList.remove('is-valid');
                        isValid = false;

                        const errorDiv = confirmPassword.nextElementSibling;
                        if (errorDiv && errorDiv.classList.contains('invalid-feedback')) {
                            errorDiv.textContent = 'Passwords do not match';
                        } else {
                            const newErrorDiv = document.createElement('div');
                            newErrorDiv.className = 'invalid-feedback';
                            newErrorDiv.textContent = 'Passwords do not match';
                            confirmPassword.parentNode.appendChild(newErrorDiv);
                        }
                    }
                }

                // Age validation for DOB
                const dobInput = currentStepElement.querySelector('input[name="dob"]');
                if (dobInput && dobInput.value) {
                    const birthDate = new Date(dobInput.value);
                    const today = new Date();
                    let age = today.getFullYear() - birthDate.getFullYear();
                    const monthDiff = today.getMonth() - birthDate.getMonth();
                    
                    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                        age--;
                    }
                    
                    if (age < 18) {
                        dobInput.classList.add('is-invalid');
                        dobInput.classList.remove('is-valid');
                        isValid = false;
                        if (!firstInvalidField) firstInvalidField = dobInput;
                        
                        let errorDiv = Array.from(dobInput.parentNode.children).find(el => el.classList.contains('invalid-feedback'));
                        if (errorDiv) {
                            errorDiv.textContent = 'You must be at least 18 years old';
                        } else {
                            const newErrorDiv = document.createElement('div');
                            newErrorDiv.className = 'invalid-feedback';
                            newErrorDiv.textContent = 'You must be at least 18 years old';
                            dobInput.parentNode.appendChild(newErrorDiv);
                        }
                    }
                }

                if (!isValid) {
                    // Shake animation
                    currentStepElement.style.animation = 'shake 0.5s';
                    setTimeout(() => {
                        currentStepElement.style.animation = '';
                    }, 500);

                    // Focus first invalid field
                    if (firstInvalidField) {
                        firstInvalidField.focus();
                    }
                    return;
                }

                document.querySelector(`.form-step[data-step="${currentStep}"]`).classList.remove('active');
                document.querySelector(`.step[data-step="${currentStep}"]`).classList.add('completed');
                currentStep++;
                document.querySelector(`.form-step[data-step="${currentStep}"]`).classList.add('active');
                document.querySelector(`.step[data-step="${currentStep}"]`).classList.add('active');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                document.querySelector(`.form-step[data-step="${currentStep}"]`).classList.remove('active');
                document.querySelector(`.step[data-step="${currentStep}"]`).classList.remove('active');
                currentStep--;
                document.querySelector(`.form-step[data-step="${currentStep}"]`).classList.add('active');
                document.querySelector(`.step[data-step="${currentStep}"]`).classList.remove('completed');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        document.getElementById('customerRegistrationForm').addEventListener('submit', function (e) {
            e.preventDefault();

            // Check if required checkboxes on final step are checked
            const agreeTerms = document.getElementById('agreeTerms');
            const agreeConduct = document.getElementById('agreeConduct');

            // Remove any previous error styling
            agreeTerms.classList.remove('is-invalid');
            agreeConduct.classList.remove('is-invalid');

            let hasError = false;
            let errorMessage = '';

            if (!agreeTerms.checked) {
                agreeTerms.classList.add('is-invalid');
                hasError = true;
                errorMessage = 'Please agree to the Terms & Conditions';
            }

            if (!agreeConduct.checked) {
                agreeConduct.classList.add('is-invalid');
                hasError = true;
                if (errorMessage) errorMessage += ' and Code of Conduct';
                else errorMessage = 'Please agree to the Code of Conduct';
            }

            if (hasError) {
                // Shake animation for checkboxes
                const checkboxContainer = document.querySelector('.form-step.active');
                checkboxContainer.style.animation = 'shake 0.5s';
                setTimeout(() => {
                    checkboxContainer.style.animation = '';
                }, 500);

                // Scroll to first error
                if (!agreeTerms.checked) {
                    agreeTerms.focus();
                } else if (!agreeConduct.checked) {
                    agreeConduct.focus();
                }
                return;
            }

            // Show loading state
            const submitBtn = document.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Processing...';

            // Real form submission
            document.getElementById('customerRegistrationForm').submit();
        });

        // Clear validation errors when checkboxes are checked
        document.getElementById('agreeTerms').addEventListener('change', function () {
            this.classList.remove('is-invalid');
        });

        document.getElementById('agreeConduct').addEventListener('change', function () {
            this.classList.remove('is-invalid');
        });

        // Bio character counter
        const bioTextarea = document.querySelector('textarea[name="bio"]');
        const charCounter = document.querySelector('.char-counter');
        if (bioTextarea && charCounter) {
            bioTextarea.addEventListener('input', function() {
                const count = this.value.length;
                charCounter.textContent = `${count} / 500 characters`;
            });
        }

        // Image preview logic
        const photoInput = document.getElementById('profilePhoto');
        const photoPreview = document.getElementById('photoPreview');
        
        if (photoInput && photoPreview) {
            photoInput.addEventListener('change', function() {
                photoPreview.innerHTML = '';
                if (this.files && this.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = 'img-thumbnail w-100 rounded-3';
                        photoPreview.appendChild(img);
                    }
                    reader.readAsDataURL(this.files[0]);
                }
            });
        }

        // Clear validation error for DOB when changed
        const dobInput = document.querySelector('input[name="dob"]');
        if (dobInput) {
            dobInput.addEventListener('change', function() {
                this.classList.remove('is-invalid');
                const errorDiv = Array.from(this.parentNode.children).find(el => el.classList.contains('invalid-feedback'));
                if (errorDiv && errorDiv.textContent === 'You must be at least 18 years old') {
                    errorDiv.remove();
                }
            });
        }
    </script>
    {% include 'front/scripts.html' %}
</body>

</html>
