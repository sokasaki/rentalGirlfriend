<!DOCTYPE html>
<html lang="en">

{% include 'admin/style.html' %}

<body>
    <!-- Dashboard Content -->
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            {% include 'admin/sidebar.html' %}

            <!-- Main Content -->
            <div class="col-lg-10 col-md-9 p-4">
                {% set header_title = 'Edit User' %}
{% include 'admin/header.html' with context %}

                <!-- Flash Messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                <script>
                    document.addEventListener('DOMContentLoaded', function () {
                        {% for category, message in messages %}
                        Swal.fire({
                            icon: '{{ "success" if category == "success" else "error" if category in ["error", "danger"] else "warning" if category == "warning" else "info" }}',
                            title: '{{ "Success!" if category == "success" else "Error!" if category in ["error", "danger"] else "Warning!" if category == "warning" else "Notice" }}',
                            text: {{ message | tojson }},
                        confirmButtonColor: '{{ "#28a745" if category == "success" else "#dc3545" if category in ["error", "danger"] else "#ffc107" if category == "warning" else "#17a2b8" }}',
                        timer: 4000,
                        timerProgressBar: true,
                        });
                    {% endfor %}
                    });
                </script>
                {% endif %}
                {% endwith %}

                <!-- Edit User Form -->
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-user-edit me-2"></i>Edit User Information</h5>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="{{ url_for('edit_user', user_id=user.user_id) }}">
                            <div class="row">
                                <!-- User ID (Read-only) -->
                                <div class="col-md-6 mb-3">
                                    <label for="user_id" class="form-label">User ID</label>
                                    <input type="text" class="form-control" id="user_id" value="{{ user.user_id }}"
                                        readonly>
                                </div>

                                <!-- Created Date (Read-only) -->
                                <div class="col-md-6 mb-3">
                                    <label for="created_at" class="form-label">Registration Date</label>
                                    <input type="text" class="form-control" id="created_at"
                                        value="{{ user.created_at.strftime('%Y-%m-%d %H:%M') if user.created_at else 'N/A' }}"
                                        readonly>
                                </div>

                                <!-- Email -->
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">Email Address <span
                                            class="text-danger">*</span></label>
                                    <input type="email" class="form-control" id="email" name="email"
                                        value="{{ user.email }}" required>
                                </div>

                                <!-- Phone -->
                                <div class="col-md-6 mb-3">
                                    <label for="phone" class="form-label">Phone Number</label>
                                    <input type="text" class="form-control" id="phone" name="phone"
                                        value="{{ user.phone or '' }}">
                                </div>

                                <!-- Password (optional for update) -->
                                <div class="col-md-6 mb-3">
                                    <label for="password" class="form-label">New Password <small
                                            class="text-muted">(Leave blank to keep current)</small></label>
                                    <input type="password" class="form-control" id="password" name="password">
                                </div>

                                <!-- Confirm Password -->
                                <div class="col-md-6 mb-3">
                                    <label for="confirm_password" class="form-label">Confirm New Password</label>
                                    <input type="password" class="form-control" id="confirm_password"
                                        name="confirm_password">
                                </div>

                                <!-- Role Selection -->
                                <div class="col-md-6 mb-3">
                                    <label for="role_id" class="form-label">User Role <span
                                            class="text-danger">*</span></label>
                                    <select class="form-select" id="role_id" name="role_id" required>
                                        <option value="">Select Role</option>
                                        {% for role in roles %}
                                        {% if role.role_name not in ['Customer', 'Companion'] %}
                                        <option value="{{ role.role_id }}" {% if role.role_id==user.role_id %}selected{%
                                            endif %}>
                                            {{ role.role_name }}
                                        </option>
                                        {% endif %}
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-4">
                                <a href="{{ url_for('users') }}" class="btn btn-secondary">
                                    <i class="fas fa-times me-2"></i>Cancel
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>Update User
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Password confirmation validation
        document.querySelector('form').addEventListener('submit', function (e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            // Only validate if a new password is being set
            if (password || confirmPassword) {
                if (password !== confirmPassword) {
                    e.preventDefault();
                    Swal.fire({
                        icon: 'error',
                        title: 'Password Mismatch',
                        text: 'Passwords do not match!',
                        confirmButtonColor: '#3085d6'
                    });
                }
            }
        });
    </script>
</body>

</html>
